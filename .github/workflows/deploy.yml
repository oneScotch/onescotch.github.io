name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Build main site
      - run: npm ci
      - run: npm run build

      # Build demystifying_video_reasoning subpage
      - name: Install subpage dependencies
        run: npm install
        working-directory: subpages/demystifying_video_reasoning
      - name: Build subpage
        run: npm run build
        working-directory: subpages/demystifying_video_reasoning

      # Merge subpage into main dist
      - name: Copy subpage into dist
        run: cp -r subpages/demystifying_video_reasoning/dist dist/demystifying_video_reasoning

      - name: Create CNAME
        run: cp CNAME dist/CNAME

      - name: Verify build output
        run: |
          echo "Main site:"
          ls -la dist/
          echo ""
          echo "Subpage:"
          ls -la dist/demystifying_video_reasoning/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
